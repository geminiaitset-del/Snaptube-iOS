name: Build iOS IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Compile and Package IPA
      run: |
        mkdir -p Payload/Snaptube.app
        
        # Compile Swift files directly for iOS arm64 target
        xcrun -sdk iphoneos swiftc -target arm64-apple-ios15.0 \
          -o Payload/Snaptube.app/Snaptube \
          ContentView.swift SnaptubeBrowser.swift SnaptubeExtractors.swift SegmentedDownloader.swift \
          -framework SwiftUI -framework WebKit
          
        # Copy Info.plist
        cp Info.plist Payload/Snaptube.app/Info.plist
        
        # Zip into IPA
        mkdir -p build/output
        zip -r build/output/Snaptube.ipa Payload
        
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Snaptube-iOS-IPA
        path: build/output/Snaptube.ipa
        if-no-files-found: error
